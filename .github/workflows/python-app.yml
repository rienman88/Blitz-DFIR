name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        continue-on-error: true

      - name: Install dev tools
        run: |
          pip install \
            "pytest>=8.0" \
            "ruff>=0.4" \
            "mypy>=1.10" \
            "pip-audit>=2.7" \
            "types-PyYAML>=6.0"

      - name: Syntax check
        run: |
          python -m compileall -q blitz_dfir tests

      - name: Lint with ruff
        run: |
          ruff check .

      - name: Type check with mypy
        run: |
          mypy blitz_dfir --ignore-missing-imports
        continue-on-error: true

      - name: Security audit
        run: |
          pip-audit
        continue-on-error: true

      - name: Test with pytest
        run: |
          python -m pytest -q
